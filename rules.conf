DOMAIN-SUFFIX,instagram.com,GLOBAL
DOMAIN-SUFFIX,twitter.com,GLOBAL
DOMAIN-SUFFIX,x.com,GLOBAL

# ===== GitHub =====
DOMAIN-SUFFIX,github.com,GLOBAL
DOMAIN-SUFFIX,githubusercontent.com,GLOBAL

# ===== Netflix =====
DOMAIN-SUFFIX,netflix.com,GLOBAL
