# =================================
# Shadowrocket 完整配置
# Tokyo + Seattle
# =================================

[General]
loglevel = notify
dns-server = 1.1.1.1,223.5.5.5
skip-proxy = 192.168.0.0/16,10.0.0.0/8,127.0.0.1,localhost,*.local
ipv6 = false


[Proxy]

TOKYO = vmess, your-tokyo-ip, 443, username=xxx, tls=true
SEATTLE = vmess, your-seattle-ip, 443, username=xxx, tls=true


[Proxy Group]

AI = select, TOKYO
GLOBAL = select, SEATTLE, TOKYO
FINAL = select, SEATTLE, TOKYO, DIRECT


[Rule]

# ===== 微信 =====
DOMAIN-SUFFIX,wechat.com,DIRECT
DOMAIN-SUFFIX,weixin.qq.com,DIRECT
DOMAIN-SUFFIX,wx.qq.com,DIRECT
DOMAIN-KEYWORD,weixin,DIRECT
DOMAIN-SUFFIX,qpic.cn,DIRECT
DOMAIN-SUFFIX,gtimg.com,DIRECT
DOMAIN-SUFFIX,tenpay.com,DIRECT

# ===== 腾讯 =====
DOMAIN-SUFFIX,qq.com,DIRECT
DOMAIN-SUFFIX,tencent.com,DIRECT

# ===== Apple =====
DOMAIN-SUFFIX,icloud.com,DIRECT
DOMAIN-SUFFIX,apple.com,DIRECT
DOMAIN-SUFFIX,apple.cn,DIRECT
DOMAIN-SUFFIX,cdn-apple.com,DIRECT

# ===== OpenAI =====
DOMAIN-SUFFIX,openai.com,AI
DOMAIN-SUFFIX,chatgpt.com,AI
DOMAIN-SUFFIX,oaistatic.com,AI
DOMAIN-SUFFIX,oaiusercontent.com,AI

# ===== TikTok =====
DOMAIN-SUFFIX,tiktok.com,SEATTLE
DOMAIN-SUFFIX,tiktokv.com,SEATTLE
DOMAIN-SUFFIX,tiktokcdn.com,SEATTLE
DOMAIN-SUFFIX,byteoversea.com,SEATTLE
DOMAIN-SUFFIX,ibyteimg.com,SEATTLE

# ===== Google =====
DOMAIN-SUFFIX,google.com,GLOBAL
DOMAIN-SUFFIX,googleapis.com,GLOBAL
DOMAIN-SUFFIX,gstatic.com,GLOBAL
DOMAIN-SUFFIX,googlevideo.com,GLOBAL

# ===== YouTube =====
DOMAIN-SUFFIX,youtube.com,GLOBAL
DOMAIN-SUFFIX,ytimg.com,GLOBAL

# ===== 社交媒体 =====
